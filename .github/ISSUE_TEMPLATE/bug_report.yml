name: Bug report
description: Report a reproducible defect in TextHumanize.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please use synthetic or redacted text if the sample is private.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Humanization pipeline
        - AI detection
        - Watermark detection or cleaning
        - Paraphrasing
        - Language pack
        - CLI
        - REST API
        - Python package
        - TypeScript package
        - PHP package
        - WordPress plugin
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TextHumanize version
      placeholder: "0.28.2, commit hash, or branch name"
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Text language
      placeholder: "en, ru, uk, de, auto, etc."
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the smallest code sample, CLI command, or API request that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input text
      description: Use synthetic or redacted text if the original content is private.
      render: text
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include traceback, detector report, score, or output diff when relevant.
      render: text
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python/PHP/Node version:
        Install method:
        Optional dependencies:
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed or redacted confidential text.
          required: true
        - label: I can reproduce this on the latest available version or current main branch.
          required: false
